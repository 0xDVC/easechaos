<svg width="2480" height="3508" viewBox="0 0 2480 3508" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="2480" height="3508" fill="#FFFFFF"/>
  <rect x="120" y="120" width="2240" height="3268" rx="24" fill="none" stroke="#E2E8F0" stroke-width="4"/>

  <!-- Logo -->
  <image x="1065" y="280" width="350" height="483" href="../../frontend/assets/easechaos.png"/>

  <!-- Headline -->
  <text x="1240" y="960" text-anchor="middle" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="148" font-weight="900" letter-spacing="-2">
    <tspan x="1240" dy="0">Tired of messy</tspan>
    <tspan x="1240" dy="165">timetable sheets?</tspan>
  </text>

  <!-- Subheadline -->
  <text x="1240" y="1260" text-anchor="middle" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="500">
    View your UMaT lectures and exam schedule in a clean, mobile-friendly format.
  </text>

  <!-- How it works -->
  <rect x="340" y="1420" width="1800" height="70" rx="35" fill="#F1F5F9"/>
  <text x="1240" y="1467" text-anchor="middle" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="1.5">HOW IT WORKS</text>

  <text x="1240" y="1620" text-anchor="middle" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="600">1. Choose your department and year</text>
  <text x="1240" y="1720" text-anchor="middle" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="600">2. View your weekly timetable or exam schedule</text>
  <text x="1240" y="1820" text-anchor="middle" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="600">3. Export or share with your class group</text>

  <!-- Separator -->
  <line x1="640" y1="1960" x2="1840" y2="1960" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Exam schedule -->
  <text x="1240" y="2070" text-anchor="middle" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700">
    Exam schedule also available.
  </text>

  <!-- CTA -->
  <rect x="840" y="2180" width="800" height="90" rx="8" fill="#0F172A"/>
  <text x="1240" y="2240" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">Scan QR to open</text>

  <!-- QR Code -->
  <rect x="940" y="2360" width="600" height="600" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="3"/>
  <image x="1020" y="2440" width="440" height="440" href="easechaos-qr.png"/>

  <!-- URL -->
  <text x="1240" y="3160" text-anchor="middle" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="700">easechaos.xyz</text>

  <!-- Footer -->
  <text x="1240" y="3260" text-anchor="middle" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="400">
    University of Mines and Technology &middot; Tarkwa
  </text>
</svg>
