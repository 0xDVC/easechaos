<svg width="2480" height="3508" viewBox="0 0 2480 3508" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#02040A"/>
      <stop offset="50%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <rect width="2480" height="3508" fill="url(#bgGrad)"/>

  <circle cx="-200" cy="400" r="800" fill="#3B82F6" opacity="0.08"/>
  <circle cx="2600" cy="3000" r="1000" fill="#8B5CF6" opacity="0.06"/>

  <!-- Logo area -->
  <rect x="1140" y="280" width="200" height="200" rx="48" fill="url(#accentGrad)"/>
  <text x="1240" y="415" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="120" font-weight="800">e</text>

  <!-- Badge -->
  <rect x="1040" y="520" width="400" height="60" rx="30" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <text x="1240" y="558" text-anchor="middle" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="2">FOR UMaT STUDENTS</text>

  <!-- Headline -->
  <text x="1240" y="740" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="160" font-weight="900" letter-spacing="-2">
    <tspan x="1240" dy="0">Timetable,</tspan>
    <tspan x="1240" dy="170" fill="#60A5FA">Simplified.</tspan>
  </text>

  <text x="1240" y="1000" text-anchor="middle" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="500" letter-spacing="0.3">
    View your lectures and exam schedule in a clean, mobile-friendly format.
  </text>

  <!-- Feature cards -->
  <rect x="440" y="1120" width="1600" height="140" rx="20" fill="url(#cardGrad)" stroke="#1E293B" stroke-width="2"/>
  <circle cx="540" cy="1190" r="30" fill="#3B82F6" opacity="0.2"/>
  <text x="540" y="1200" text-anchor="middle" fill="#60A5FA" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700">&#x2713;</text>
  <text x="610" y="1197" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="600">Select your department and year instantly</text>

  <rect x="440" y="1290" width="1600" height="140" rx="20" fill="url(#cardGrad)" stroke="#1E293B" stroke-width="2"/>
  <circle cx="540" cy="1360" r="30" fill="#8B5CF6" opacity="0.2"/>
  <text x="540" y="1371" text-anchor="middle" fill="#A78BFA" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700">&#x2713;</text>
  <text x="610" y="1367" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="600">View weekly lecture or daily agenda view</text>

  <rect x="440" y="1460" width="1600" height="140" rx="20" fill="url(#cardGrad)" stroke="#1E293B" stroke-width="2"/>
  <circle cx="540" cy="1530" r="30" fill="#10B981" opacity="0.2"/>
  <text x="540" y="1541" text-anchor="middle" fill="#34D399" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700">&#x2713;</text>
  <text x="610" y="1537" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="600">Check exam schedule, dates, and papers</text>

  <rect x="440" y="1630" width="1600" height="140" rx="20" fill="url(#cardGrad)" stroke="#1E293B" stroke-width="2"/>
  <circle cx="540" cy="1700" r="30" fill="#F59E0B" opacity="0.2"/>
  <text x="540" y="1711" text-anchor="middle" fill="#FBBF24" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700">&#x2713;</text>
  <text x="610" y="1707" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="600">Export as PDF, image, or add to calendar</text>

  <!-- CTA -->
  <rect x="840" y="1880" width="800" height="90" rx="45" fill="url(#btnGrad)"/>
  <text x="1240" y="1940" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">Scan to open easeCHAOS</text>

  <!-- QR Code -->
  <rect x="840" y="2060" width="800" height="800" rx="40" fill="#FFFFFF"/>
  <rect x="860" y="2080" width="760" height="760" rx="30" fill="#F8FAFC"/>
  <image x="960" y="2180" width="560" height="560" href="easechaos-qr.png"/>

  <!-- URL bar -->
  <rect x="640" y="2980" width="1200" height="90" rx="45" fill="#0F172A" stroke="#1E293B" stroke-width="2"/>
  <text x="1240" y="3040" text-anchor="middle" fill="#60A5FA" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="600">easechaos.xyz</text>

  <!-- Footer -->
  <text x="1240" y="3220" text-anchor="middle" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500">
    Share this link with your class group.
  </text>

  <text x="1240" y="3300" text-anchor="middle" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="400">
    University of Mines and Technology &middot; Tarkwa
  </text>
</svg>
